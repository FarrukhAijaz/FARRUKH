appId: com.farrukh.pos
productName: FARRUKH
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
# Unpack native modules AND seed images so Express can read them at runtime
asarUnpack:
  - resources/**
  - "**/*.node"
afterPack: ./after-pack.js
# Bundle waiter-mobile WITH pre-installed node_modules so Metro starts immediately
# (node_modules are injected by the afterPack hook — electron-builder strips them from extraResources)
extraResources:
  - from: src/renderer/public
    to: public
    filter:
      - "**/*"
  - from: ../waiter-mobile
    to: waiter-mobile
    filter:
      - "**/*"
      - "!node_modules/**"
      - "!.expo/**"
      - "!android/**"
      - "!ios/**"
      - "!.git/**"
      - "!*.tgz"
win:
  icon: resources/icon.png
  executableName: FARRUKH
nsis:
  artifactName: FARRUKH-${version}-Setup.${ext}
  shortcutName: FARRUKH
  uninstallDisplayName: FARRUKH
  createDesktopShortcut: always
  oneClick: false
  allowToChangeInstallationDirectory: true
mac:
  icon: resources/icon.png
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: false
dmg:
  artifactName: FARRUKH-${version}.${ext}
linux:
  icon: resources/icon.png
  target:
    - AppImage
    - deb
  maintainer: Farrukh Restaurant
  category: Office
appImage:
  artifactName: FARRUKH-${version}.${ext}
deb:
  artifactName: FARRUKH-${version}.${ext}
npmRebuild: false
publish: null
